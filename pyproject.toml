" """

[tool.poe.tasks.clean]
help = "Remove ignored caches, coverage, and build artifacts"
cmd = """
    rm -rf .coverage
           .coverage.*
           dist/
           build/
           .mypy_cache/
           .pytest_cache/
           .ruff_cache/
           htmlcov/
           xmlcov/
           **/__pycache__/
           **/.ipynb_checkpoints/
    """

[tool.poe.tasks.format]
help = "Format code via ruff"
cmd = "ruff format ."

[tool.poe.tasks.ruff]
help = "Lint code via ruff"
cmd = "ruff check ."

[tool.poe.tasks.mypy]
help = "Lint types via mypy"
cmd = "mypy src/slicktune tests"

[tool.poe.tasks.test]
help = "Run unit-tests via pytest"
cmd = """
    python -m pytest
        --cov=slicktune
        --cov-report=term-missing
        --cov-report=html
        --cov-report=xml
        --cov-config=.coveragerc
        --tb=short
        -ra
        -v
    """

[tool.poe.tasks.train-lora]
help = "Smoke-train LoRA SFT on the personal about-me dataset"
cmd = "python examples/run_sft_lora.py"

[tool.poe.tasks.probe-lora]
help = "Probe the saved LoRA checkpoint against about-me probes"
cmd = """
    slicktune probe
        --model-dir outputs/sft_lora
        --probes examples/data/about_amir.probes.jsonl
    """

[tool.poe.tasks.eval-lora]
help = "Holdout PPL + probe judge on the saved LoRA checkpoint"
cmd = """
    slicktune eval
        --model-dir outputs/sft_lora
        --eval-data examples/data/about_amir.eval.jsonl
        --probes examples/data/about_amir.probes.jsonl
        --judge substring
    """

[tool.poe.tasks.sphinx]
help = "Build API docs via sphinx"
cmd = "sphinx-build -b html docs/ docs/_build"

[tool.poe.tasks.check]
help = "Check all linting steps."
sequence = [
    "greet",
    { cmd = "poe format --check" },
    { cmd = "poe ruff" },
    { cmd = "poe mypy" },
]

[tool.poe.tasks.lint]
help = "Format then check"
sequence = ["format", "check"]

[tool.poe.tasks.ci]
help = "CI gate: format check, lint, and tests"
sequence = ["check", "test"]

[tool.poe.tasks.build]
help = "Build sdist and wheel via uv"
cmd = "uv build"
