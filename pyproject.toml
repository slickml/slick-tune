[project]
name = "slicktune"
version = "0.2.0"
description = "SlickML fine-tuning toolkit: composable strategies, objectives, and metrics for LLMs"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Amirhessam Tahmassebi", email = "admin@slickml.com" },
]
requires-python = ">=3.10,<3.13"
keywords = [
    "llm",
    "fine-tuning",
    "peft",
    "lora",
    "qlora",
    "sft",
    "machine-learning",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "torch>=2.2",
    "transformers>=4.44",
    "peft>=0.12",
    "trl>=0.12",
    "datasets>=3.0",
    "accelerate>=0.34",
    "sentencepiece>=0.2",
    "click>=8.1",
    "rich>=13.0",
]

[project.optional-dependencies]
qlora = ["bitsandbytes>=0.43"]
dev = [
    "assertpy>=1.1",
    "mypy>=2.3.0",
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "ruff>=0.6",
]
docs = [
    "sphinx>=5.3",
    "sphinx-autoapi>=1.9",
    "sphinx-design>=0.3",
    "myst-parser>=0.18",
    "furo>=2022.9",
    "sphinxcontrib-mermaid>=0.9",
]

[project.scripts]
slicktune = "slicktune.cli.main:cli"

[project.urls]
Homepage = "https://www.slickml.com"
Repository = "https://github.com/slickml/slick-tune"
Documentation = "https://github.com/slickml/slick-tune/tree/master/docs"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/slicktune"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/assets",
    "/README.md",
    "/LICENSE",
    "/pyproject.toml",
]
exclude = ["/.gitignore"]

[tool.uv]
default-groups = ["dev"]

[dependency-groups]
dev = [
    "assertpy>=1.1",
    "mypy>=2.3.0",
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "ruff>=0.6",
]
docs = [
    "sphinx>=5.3",
    "sphinx-autoapi>=1.9",
    "sphinx-design>=0.3",
    "myst-parser>=0.18",
    "furo>=2022.9",
    "sphinxcontrib-mermaid>=0.9",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "gpu: tests that require a CUDA GPU",
    "slow: end-to-end training smoke tests",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests", "examples"]
extend-exclude = ["outputs", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "ANN", # type annotations (ruff typechecking)
]
ignore = [
    "ANN401", # Allow Any where interop with HF/PEFT requires it
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN"]
"examples/**/*.py" = ["ANN"]

[tool.ruff.lint.isort]
known-first-party = ["slicktune"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true

[tool.mypy]
# Use 3.12 for stub parsing (NumPy 2.x stubs need PEP 695 `type` statements).
# Runtime support remains >=3.10 via requires-python.
python_version = "3.12"
files = ["src/slicktune", "tests"]
mypy_path = "src"
explicit_package_bases = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
show_error_codes = true
exclude = [
    "(?x)(^\\.venv/|^build/|^dist/|^outputs/)",
]

[[tool.mypy.overrides]]
module = ["numpy", "numpy.*"]
follow_imports = "skip"

