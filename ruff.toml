# https://docs.astral.sh/ruff/configuration/

line-length = 100
target-version = "py310"
src = ["src", "tests", "examples"]
extend-exclude = ["outputs", ".venv"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "ANN", # type annotations (ruff typechecking)
]
ignore = [
    "ANN401", # Allow Any where interop with HF/PEFT requires it
]

[lint.per-file-ignores]
"tests/**/*.py" = ["ANN"]
"examples/**/*.py" = ["ANN"]

[lint.isort]
known-first-party = ["slicktune"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
